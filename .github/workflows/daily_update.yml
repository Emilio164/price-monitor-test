name: Daily Price Update

on:
  schedule:
    - cron: '0 11 * * *' # Corre todos los días a las 08:00 AM (Hora Argentina aprox, UTC 11:00)
  workflow_dispatch: # Permite correrlo manualmente

jobs:
  update-prices:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Soluciona el warning de Node.js 20
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
          
      - name: Run price update
        run: python update_prices.py
        
      - name: Upload Debug HTML Logs
        if: always() # Esto asegura que se suban los logs incluso si el script falla
        uses: actions/upload-artifact@v4
        with:
          name: debug-html-logs
          path: logs/debug_html/
          retention-days: 7 # Se guardan por una semana
